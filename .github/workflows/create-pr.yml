name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: "!contains(github.event.comment.body , '[vx.dev]') && github.event.comment.user.type != 'bot'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Create common.ts with branch creation
        run: |
          cat > prompts/common.ts << 'EOF'
          export function getIssueEvent() {
            try {
              const eventPath = Deno.env.get('GITHUB_EVENT_PATH');
              if (!eventPath) {
                console.warn('GITHUB_EVENT_PATH não encontrado');
                return null;
              }
              const eventData = JSON.parse(Deno.readTextFileSync(eventPath));
              console.log('✅ Evento carregado');
              return eventData;
            } catch (error) {
              console.error('❌ Erro ao ler evento:', error);
              return null;
            }
          }
          
          export function getIssueData(event: any) {
            if (!event) return null;
            const issue = event.issue || event.pull_request;
            const repo = event.repository;
            const comment = event.comment;
            
            return {
              issueNumber: issue?.number || 0,
              issueTitle: issue?.title || '',
              issueBody: issue?.body || '',
              issueAuthor: issue?.user?.login || '',
              repoName: repo?.name || '',
              repoOwner: repo?.owner?.login || '',
              commentBody: comment?.body || '',
              commentAuthor: comment?.user?.login || '',
              action: event.action || '',
              labels: issue?.labels || [],
              isLabeled: issue?.labels?.some((l: any) => l.name === 'vx.dev') || false
            };
          }
          
          export async function githubRequest(endpoint: string, token: string, options: any = {}) {
            const url = `https://api.github.com${endpoint}`;
            console.log(`🌐 ${options.method || 'GET'} ${url}`);
            
            const response = await fetch(url, {
              ...options,
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'vx-dev/1.0.0',
                ...options.headers
              }
            });
            
            const data = await response.json();
            if (!response.ok) {
              console.error('❌ Erro:', data);
              throw new Error(`GitHub API error ${response.status}: ${JSON.stringify(data)}`);
            }
            
            return data;
          }
          
          // Função para criar branch
          export async function createBranch(token: string, repoOwner: string, repoName: string, branchName: string, baseBranch: string = 'main') {
            console.log(`🌿 Criando branch ${branchName} a partir de ${baseBranch}`);
            
            // Obtém o SHA do branch base
            const baseRef = await githubRequest(
              `/repos/${repoOwner}/${repoName}/git/ref/heads/${baseBranch}`,
              token
            );
            
            const sha = baseRef.object.sha;
            console.log(`📌 SHA do branch base: ${sha}`);
            
            // Cria o novo branch
            const newRef = await githubRequest(
              `/repos/${repoOwner}/${repoName}/git/refs`,
              token,
              {
                method: 'POST',
                body: JSON.stringify({
                  ref: `refs/heads/${branchName}`,
                  sha: sha
                })
              }
            );
            
            console.log(`✅ Branch ${branchName} criado com sucesso!`);
            return newRef;
          }
          
          // Função para criar PR
          export async function createPRFromIssue(token: string, issueData: any) {
            const { repoOwner, repoName, issueNumber, issueTitle, issueBody } = issueData;
            
            const branchName = `vx-dev/issue-${issueNumber}`;
            const baseBranch = 'main'; // Altere para o branch padrão do seu repositório
            
            try {
              // 1. Primeiro, cria o branch
              await createBranch(token, repoOwner, repoName, branchName, baseBranch);
              
              // 2. Agora cria o PR
              console.log(`📝 Criando PR de ${branchName} para ${baseBranch}`);
              const prData = {
                title: `PR: ${issueTitle}`,
                body: `Resolve a issue #${issueNumber}\n\n${issueBody}\n\n---\n\n🤖 Gerado automaticamente pelo vx.dev`,
                head: branchName,
                base: baseBranch,
                draft: false
              };
              
              const pr = await githubRequest(
                `/repos/${repoOwner}/${repoName}/pulls`,
                token,
                {
                  method: 'POST',
                  body: JSON.stringify(prData)
                }
              );
              
              console.log(`✅ PR #${pr.number} criado: ${pr.html_url}`);
              return pr;
            } catch (error) {
              console.error('❌ Erro ao criar PR:', error.message);
              throw error;
            }
          }
          EOF
      
      - name: Create entry.ts
        run: |
          cat > prompts/entry.ts << 'EOF'
          import { getIssueEvent, getIssueData, createPRFromIssue, githubRequest } from "./common.ts";
          
          async function main() {
            try {
              console.log('🚀 vx.dev iniciado');
              
              const event = getIssueEvent();
              if (!event) {
                console.log('❌ Nenhum evento encontrado');
                Deno.exit(1);
              }
              
              const issueData = getIssueData(event);
              if (!issueData || issueData.issueNumber === 0) {
                console.log('❌ Nenhuma issue encontrada');
                Deno.exit(1);
              }
              
              const token = Deno.env.get('GH_TOKEN');
              if (!token) {
                console.error('❌ GH_TOKEN não configurado');
                Deno.exit(1);
              }
              
              console.log(`📝 Issue #${issueData.issueNumber}: ${issueData.issueTitle}`);
              console.log(`📂 Repositório: ${issueData.repoOwner}/${issueData.repoName}`);
              console.log(`🏷️ Labels: ${issueData.labels.map((l: any) => l.name).join(', ') || 'nenhuma'}`);
              
              // Verifica condições para processar
              if (issueData.isLabeled || issueData.action === 'labeled') {
                console.log('✅ Label vx.dev detectada, processando...');
                
                try {
                  const pr = await createPRFromIssue(token, issueData);
                  console.log('🎉 PR criado com sucesso!');
                  
                  // Comenta na issue com o link do PR
                  await githubRequest(
                    `/repos/${issueData.repoOwner}/${issueData.repoName}/issues/${issueData.issueNumber}/comments`,
                    token,
                    {
                      method: 'POST',
                      body: JSON.stringify({
                        body: `✅ PR criado com sucesso: ${pr.html_url}\n\nNúmero: #${pr.number}`
                      })
                    }
                  );
                  
                } catch (error) {
                  console.error('❌ Falha ao criar PR:', error.message);
                  // Comenta o erro na issue
                  await githubRequest(
                    `/repos/${issueData.repoOwner}/${issueData.repoName}/issues/${issueData.issueNumber}/comments`,
                    token,
                    {
                      method: 'POST',
                      body: JSON.stringify({
                        body: `❌ Erro ao criar PR: ${error.message}`
                      })
                    }
                  );
                  Deno.exit(1);
                }
              } else {
                console.log('⏭️ Nenhuma condição atendida, ignorando...');
              }
              
              console.log('✅ Processo concluído');
            } catch (error) {
              console.error('❌ Erro fatal:', error.message);
              Deno.exit(1);
            }
          }
          
          await main();
          EOF
      
      - name: Generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
        run: deno run -A prompts/entry.ts
