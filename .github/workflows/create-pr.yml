name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: |
      github.event_name == 'issues' ||
      ((github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment') &&
       github.event.comment.user.type != 'Bot')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 1.38.3
      - name: generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
        run: deno run -A prompts/entry.ts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Enable Corepack
        run: corepack enable

      - name: Read build directory
        id: build-dir
        run: |
          DIR=$(cat scripts/build-task 2>/dev/null || echo "preview-ui")
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Build preview
        run: |
          cd ${{ steps.build-dir.outputs.dir }}
          yarn install
          yarn build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.build-dir.outputs.dir }}/dist
          destination_dir: pr-${{ github.event.issue.number }}
          keep_files: true
          commit_message: "Deploy preview for issue #${{ github.event.issue.number }}"
