name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: "!contains(github.event.comment.body , '[vx.dev]') && github.event.comment.user.type != 'bot'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Create common.ts with improved logic
        run: |
          cat > prompts/common.ts << 'EOF'
          export function getIssueEvent() {
            try {
              const eventPath = Deno.env.get('GITHUB_EVENT_PATH');
              if (!eventPath) {
                console.warn('GITHUB_EVENT_PATH não encontrado, usando dados mock');
                return getMockEvent();
              }
              
              const eventData = JSON.parse(Deno.readTextFileSync(eventPath));
              console.log('Evento recebido:', JSON.stringify(eventData, null, 2));
              
              return eventData;
            } catch (error) {
              console.error('Erro ao ler evento:', error);
              return getMockEvent();
            }
          }
          
          function getMockEvent() {
            return {
              action: 'created',
              issue: {
                number: 1,
                title: 'Test Issue',
                body: 'Test body',
                user: { login: 'test-user' }
              },
              repository: {
                name: 'vx.dev',
                owner: { login: 'owner' }
              },
              comment: {
                body: 'Test comment',
                user: { login: 'test-user' }
              }
            };
          }
          
          export function getIssueData(event: any) {
            const issue = event.issue || event.pull_request;
            const repo = event.repository;
            const comment = event.comment;
            
            return {
              issueNumber: issue?.number || 0,
              issueTitle: issue?.title || '',
              issueBody: issue?.body || '',
              issueAuthor: issue?.user?.login || '',
              repoName: repo?.name || '',
              repoOwner: repo?.owner?.login || '',
              commentBody: comment?.body || '',
              commentAuthor: comment?.user?.login || '',
              action: event.action || '',
              labels: issue?.labels || [],
              isLabeled: event.action === 'labeled' || issue?.labels?.some((l: any) => l.name === 'vx.dev') || false
            };
          }
          
          // Verifica se deve processar a issue
          export function shouldProcessIssue(issueData: any) {
            // Condição 1: Issue foi marcada com label específica
            if (issueData.isLabeled) {
              console.log('✅ Issue marcada com vx.dev');
              return true;
            }
            
            // Condição 2: Issue foi editada e tem vx.dev no título ou corpo
            if (issueData.action === 'edited' && 
                (issueData.issueTitle?.includes('vx.dev') || 
                 issueData.issueBody?.includes('vx.dev'))) {
              console.log('✅ Issue contém vx.dev no título ou corpo');
              return true;
            }
            
            // Condição 3: Comentário contém [vx.dev]
            if (issueData.commentBody?.includes('[vx.dev]')) {
              console.log('✅ Comentário contém [vx.dev]');
              return true;
            }
            
            // Condição 4: Qualquer comentário (se estiver configurado)
            if (issueData.commentBody && Deno.env.get('PROCESS_ALL_COMMENTS') === 'true') {
              console.log('✅ Processando todos os comentários');
              return true;
            }
            
            console.log('⏭️ Nenhuma condição atendida, ignorando...');
            return false;
          }
          
          export async function createPRFromIssue(token: string, issueData: any) {
            const { repoOwner, repoName, issueNumber, issueTitle, issueBody } = issueData;
            
            // Busca o conteúdo da issue
            const issueContent = await githubRequest(
              `/repos/${repoOwner}/${repoName}/issues/${issueNumber}`,
              token
            );
            
            const branchName = `pr-from-issue-${issueNumber}-${Date.now()}`;
            
            const prData = {
              title: `PR: ${issueTitle}`,
              body: `Este PR resolve a issue #${issueNumber}\n\n${issueBody}\n\n---\n\nGerado automaticamente pelo vx.dev`,
              head: branchName,
              base: 'main'
            };
            
            return await githubRequest(
              `/repos/${repoOwner}/${repoName}/pulls`,
              token,
              {
                method: 'POST',
                body: JSON.stringify(prData)
              }
            );
          }
          
          export async function addLabel(token: string, repoOwner: string, repoName: string, issueNumber: number, label: string) {
            return await githubRequest(
              `/repos/${repoOwner}/${repoName}/issues/${issueNumber}/labels`,
              token,
              {
                method: 'POST',
                body: JSON.stringify([label])
              }
            );
          }
          
          export async function githubRequest(endpoint: string, token: string, options: any = {}) {
            const response = await fetch(`https://api.github.com${endpoint}`, {
              ...options,
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'vx-dev/1.0.0',
                ...options.headers
              }
            });
            
            if (!response.ok) {
              const error = await response.text();
              throw new Error(`GitHub API error ${response.status}: ${error}`);
            }
            
            return response.json();
          }
          EOF
      
      - name: Create entry.ts with conditions
        run: |
          cat > prompts/entry.ts << 'EOF'
          import { 
            getIssueEvent, 
            getIssueData, 
            shouldProcessIssue,
            createPRFromIssue, 
            addLabel,
            githubRequest 
          } from "./common.ts";
          
          async function main() {
            try {
              console.log('🚀 Iniciando processo...');
              
              const event = getIssueEvent();
              const issueData = getIssueData(event);
              
              console.log('📋 Dados da Issue:', {
                número: issueData.issueNumber,
                título: issueData.issueTitle,
                autor: issueData.issueAuthor,
                repositório: `${issueData.repoOwner}/${issueData.repoName}`,
                ação: issueData.action,
                temLabel: issueData.isLabeled,
                labels: issueData.labels.map((l: any) => l.name).join(', ')
              });
              
              const token = Deno.env.get('GH_TOKEN');
              if (!token) {
                throw new Error('GH_TOKEN não configurado');
              }
              
              // Verifica se deve processar
              if (!shouldProcessIssue(issueData)) {
                console.log('⏭️ Issue ignorada');
                return;
              }
              
              // Processa a issue
              if (event.issue || event.pull_request) {
                console.log('📝 Processando issue/PR...');
                
                // Busca detalhes da issue
                const issueDetails = await githubRequest(
                  `/repos/${issueData.repoOwner}/${issueData.repoName}/issues/${issueData.issueNumber}`,
                  token
                );
                
                console.log('📄 Detalhes da issue:', {
                  título: issueDetails.title,
                  estado: issueDetails.state,
                  labels: issueDetails.labels?.map((l: any) => l.name) || []
                });
                
                // Se a ação for 'labeled' ou já tiver a label
                if (issueData.action === 'labeled' || issueData.isLabeled) {
                  console.log('🏷️ Processando issue com label vx.dev...');
                  
                  try {
                    const pr = await createPRFromIssue(token, issueData);
                    console.log('✅ PR criado com sucesso!');
                    console.log('🔗 URL:', pr.html_url);
                    console.log('📝 Número:', pr.number);
                    
                    // Adiciona label de PR criado
                    await addLabel(
                      token, 
                      issueData.repoOwner, 
                      issueData.repoName, 
                      issueData.issueNumber, 
                      'pr-criado'
                    );
                    console.log('✅ Label "pr-criado" adicionada');
                    
                  } catch (error) {
                    console.error('❌ Erro ao criar PR:', error.message);
                    
                    // Adiciona label de erro
                    await addLabel(
                      token, 
                      issueData.repoOwner, 
                      issueData.repoName, 
                      issueData.issueNumber, 
                      'erro-geracao'
                    );
                  }
                }
              } else if (event.comment) {
                console.log('💬 Processando comentário...');
                console.log('Comentário:', event.comment.body?.substring(0, 100) + '...');
                
                // Verifica se o comentário contém comando
                if (event.comment.body?.includes('[vx.dev]')) {
                  console.log('🔧 Comando vx.dev detectado!');
                  
                  // Adiciona label manualmente se não tiver
                  if (!issueData.isLabeled) {
                    await addLabel(
                      token, 
                      issueData.repoOwner, 
                      issueData.repoName, 
                      issueData.issueNumber, 
                      'vx.dev'
                    );
                    console.log('✅ Label vx.dev adicionada via comentário');
                  }
                }
              } else {
                console.log('ℹ️ Evento não identificado:', event.action);
              }
              
              console.log('✅ Processo concluído!');
            } catch (error) {
              console.error('❌ Erro:', error.message);
              console.error('Stack:', error.stack);
              Deno.exit(1);
            }
          }
          
          await main();
          EOF
      
      - name: Generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
          PROCESS_ALL_COMMENTS: ${{ vars.PROCESS_ALL_COMMENTS || 'false' }}
        run: deno run -A prompts/entry.ts
