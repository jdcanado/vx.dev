name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: "!contains(github.event.comment.body , '[vx.dev]') && github.event.comment.user.type != 'bot'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Create common.ts (versão original corrigida)
        run: |
          cat > prompts/common.ts << 'EOF'
          // Função para obter o evento do GitHub
          export function getIssueEvent() {
            try {
              const eventPath = Deno.env.get('GITHUB_EVENT_PATH');
              if (!eventPath) {
                console.warn('GITHUB_EVENT_PATH não encontrado');
                return null;
              }
              
              const eventData = JSON.parse(Deno.readTextFileSync(eventPath));
              console.log('✅ Evento carregado com sucesso');
              return eventData;
            } catch (error) {
              console.error('❌ Erro ao ler evento:', error);
              return null;
            }
          }
          
          // Função para extrair dados da issue
          export function getIssueData(event: any) {
            if (!event) return null;
            
            // Obtém a issue (pode vir de issue, pull_request, ou do comentário)
            const issue = event.issue || event.pull_request;
            const repo = event.repository;
            const comment = event.comment;
            
            // Log para debug
            console.log('📋 Dados extraídos:');
            console.log(`  - Issue: ${issue?.number || 'N/A'}`);
            console.log(`  - Repo: ${repo?.full_name || 'N/A'}`);
            console.log(`  - Comment: ${comment?.user?.login || 'N/A'}`);
            
            return {
              issueNumber: issue?.number || 0,
              issueTitle: issue?.title || '',
              issueBody: issue?.body || '',
              issueAuthor: issue?.user?.login || '',
              repoName: repo?.name || '',
              repoOwner: repo?.owner?.login || '',
              commentBody: comment?.body || '',
              commentAuthor: comment?.user?.login || '',
              action: event.action || '',
              labels: issue?.labels || [],
              isLabeled: issue?.labels?.some((l: any) => l.name === 'vx.dev') || false
            };
          }
          
          // Função para fazer requisições à API do GitHub
          export async function githubRequest(endpoint: string, token: string, options: any = {}) {
            const url = `https://api.github.com${endpoint}`;
            const response = await fetch(url, {
              ...options,
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'vx-dev/1.0.0',
                ...options.headers
              }
            });
            
            if (!response.ok) {
              const error = await response.text();
              throw new Error(`GitHub API error ${response.status}: ${error}`);
            }
            
            return response.json();
          }
          
          // Função para criar PR a partir da issue
          export async function createPRFromIssue(token: string, issueData: any) {
            const { repoOwner, repoName, issueNumber, issueTitle, issueBody } = issueData;
            
            // Busca o conteúdo da issue para obter mais detalhes
            const issueContent = await githubRequest(
              `/repos/${repoOwner}/${repoName}/issues/${issueNumber}`,
              token
            );
            
            // Nome do branch baseado na issue
            const branchName = `pr-from-issue-${issueNumber}`;
            
            const prData = {
              title: `PR: ${issueTitle}`,
              body: `Resolve a issue #${issueNumber}\n\n${issueBody}\n\n---\n\nGerado automaticamente pelo vx.dev`,
              head: branchName,
              base: 'main'
            };
            
            return await githubRequest(
              `/repos/${repoOwner}/${repoName}/pulls`,
              token,
              {
                method: 'POST',
                body: JSON.stringify(prData)
              }
            );
          }
          EOF
      
      - name: Create entry.ts (versão original)
        run: |
          cat > prompts/entry.ts << 'EOF'
          import { getIssueEvent, getIssueData, createPRFromIssue, githubRequest } from "./common.ts";
          
          async function main() {
            try {
              console.log('🚀 vx.dev iniciado');
              
              // Obtém o evento
              const event = getIssueEvent();
              if (!event) {
                console.log('❌ Nenhum evento encontrado');
                Deno.exit(1);
              }
              
              const issueData = getIssueData(event);
              if (!issueData || issueData.issueNumber === 0) {
                console.log('❌ Nenhuma issue encontrada no evento');
                Deno.exit(1);
              }
              
              const token = Deno.env.get('GH_TOKEN');
              if (!token) {
                console.error('❌ GH_TOKEN não configurado');
                Deno.exit(1);
              }
              
              console.log(`📝 Processando issue #${issueData.issueNumber}: ${issueData.issueTitle}`);
              console.log(`📂 Repositório: ${issueData.repoOwner}/${issueData.repoName}`);
              console.log(`🏷️ Labels: ${issueData.labels.map((l: any) => l.name).join(', ') || 'nenhuma'}`);
              console.log(`🎯 Ação: ${issueData.action}`);
              
              // Verifica se a issue tem a label vx.dev ou se foi recém marcada
              if (issueData.isLabeled || issueData.action === 'labeled') {
                console.log('✅ Issue marcada com vx.dev, processando...');
                
                const pr = await createPRFromIssue(token, issueData);
                console.log('✅ PR criado com sucesso!');
                console.log(`🔗 URL: ${pr.html_url}`);
                console.log(`📝 Número: #${pr.number}`);
              } else if (issueData.commentBody?.includes('[vx.dev]')) {
                console.log('✅ Comando [vx.dev] detectado no comentário, processando...');
                
                // Adiciona a label vx.dev à issue
                await githubRequest(
                  `/repos/${issueData.repoOwner}/${issueData.repoName}/issues/${issueData.issueNumber}/labels`,
                  token,
                  {
                    method: 'POST',
                    body: JSON.stringify(['vx.dev'])
                  }
                );
                console.log('🏷️ Label vx.dev adicionada à issue');
                
                const pr = await createPRFromIssue(token, issueData);
                console.log('✅ PR criado com sucesso!');
                console.log(`🔗 URL: ${pr.html_url}`);
                console.log(`📝 Número: #${pr.number}`);
              } else {
                console.log('⏭️ Nenhuma condição atendida, ignorando...');
                console.log('💡 Para ativar:');
                console.log('  - Adicione a label "vx.dev" à issue');
                console.log('  - Ou comente "[vx.dev]" na issue');
              }
              
              console.log('✅ Processo concluído');
            } catch (error) {
              console.error('❌ Erro:', error.message);
              Deno.exit(1);
            }
          }
          
          await main();
          EOF
      
      - name: Generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
        run: deno run -A prompts/entry.ts
