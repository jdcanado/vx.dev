name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: "!contains(github.event.comment.body , '[vx.dev]') && github.event.comment.user.type != 'bot'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Create common.ts with GitHub context
        run: |
          cat > prompts/common.ts << 'EOF'
          // Lê o evento do GitHub do arquivo de contexto
          export function getIssueEvent() {
            try {
              // O GitHub Actions fornece o evento no arquivo GITHUB_EVENT_PATH
              const eventPath = Deno.env.get('GITHUB_EVENT_PATH');
              if (!eventPath) {
                console.warn('GITHUB_EVENT_PATH não encontrado, usando dados mock');
                return getMockEvent();
              }
              
              const eventData = JSON.parse(Deno.readTextFileSync(eventPath));
              console.log('Evento recebido:', JSON.stringify(eventData, null, 2));
              
              return eventData;
            } catch (error) {
              console.error('Erro ao ler evento:', error);
              return getMockEvent();
            }
          }
          
          function getMockEvent() {
            return {
              action: 'created',
              issue: {
                number: 1,
                title: 'Test Issue',
                body: 'Test body',
                user: { login: 'test-user' }
              },
              repository: {
                name: 'vx.dev',
                owner: { login: 'owner' }
              },
              comment: {
                body: 'Test comment',
                user: { login: 'test-user' }
              }
            };
          }
          
          // Função para extrair dados relevantes da issue
          export function getIssueData(event: any) {
            const issue = event.issue || event.pull_request || event.comment?.issue;
            const repo = event.repository;
            const comment = event.comment;
            
            return {
              issueNumber: issue?.number || 0,
              issueTitle: issue?.title || '',
              issueBody: issue?.body || '',
              issueAuthor: issue?.user?.login || '',
              repoName: repo?.name || '',
              repoOwner: repo?.owner?.login || '',
              commentBody: comment?.body || '',
              commentAuthor: comment?.user?.login || '',
              action: event.action || ''
            };
          }
          
          // Função para criar PR com base na issue
          export async function createPRFromIssue(token: string, issueData: any) {
            const { repoOwner, repoName, issueNumber, issueTitle, issueBody } = issueData;
            
            // Busca o conteúdo da issue
            const issueContent = await githubRequest(
              `/repos/${repoOwner}/${repoName}/issues/${issueNumber}`,
              token
            );
            
            // Cria um branch baseado na issue
            const branchName = `pr-from-issue-${issueNumber}`;
            
            // Cria o PR
            const prData = {
              title: `PR: ${issueTitle}`,
              body: `Este PR resolve a issue #${issueNumber}\n\n${issueBody}`,
              head: branchName,
              base: 'main'
            };
            
            return await githubRequest(
              `/repos/${repoOwner}/${repoName}/pulls`,
              token,
              {
                method: 'POST',
                body: JSON.stringify(prData)
              }
            );
          }
          
          export async function githubRequest(endpoint: string, token: string, options: any = {}) {
            const response = await fetch(`https://api.github.com${endpoint}`, {
              ...options,
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'vx-dev/1.0.0',
                ...options.headers
              }
            });
            
            if (!response.ok) {
              const error = await response.text();
              throw new Error(`GitHub API error ${response.status}: ${error}`);
            }
            
            return response.json();
          }
          EOF
      
      - name: Create entry.ts with real issue data
        run: |
          cat > prompts/entry.ts << 'EOF'
          import { getIssueEvent, getIssueData, createPRFromIssue, githubRequest } from "./common.ts";
          
          async function main() {
            try {
              console.log('🚀 Iniciando processo...');
              
              // Obtém o evento real do GitHub
              const event = getIssueEvent();
              const issueData = getIssueData(event);
              
              console.log('📋 Dados da Issue:', {
                número: issueData.issueNumber,
                título: issueData.issueTitle,
                autor: issueData.issueAuthor,
                repositório: `${issueData.repoOwner}/${issueData.repoName}`
              });
              
              const token = Deno.env.get('GH_TOKEN');
              if (!token) {
                throw new Error('GH_TOKEN não configurado');
              }
              
              // Verifica se é uma issue ou comentário
              if (event.issue || event.pull_request) {
                console.log('📝 Processando issue/PR...');
                
                // Busca informações detalhadas da issue
                const issueDetails = await githubRequest(
                  `/repos/${issueData.repoOwner}/${issueData.repoName}/issues/${issueData.issueNumber}`,
                  token
                );
                
                console.log('📄 Detalhes da issue:', {
                  título: issueDetails.title,
                  estado: issueDetails.state,
                  labels: issueDetails.labels?.map((l: any) => l.name) || []
                });
                
                // Verifica se a issue tem label específica
                const hasVxLabel = issueDetails.labels?.some((l: any) => l.name === 'vx.dev');
                
                if (hasVxLabel || event.action === 'labeled') {
                  console.log('🏷️ Issue marcada para processamento!');
                  
                  // Cria o PR baseado na issue
                  const pr = await createPRFromIssue(token, issueData);
                  console.log('✅ PR criado com sucesso:', pr.html_url);
                } else {
                  console.log('⏭️ Issue não marcada com vx.dev, ignorando...');
                }
              } else if (event.comment) {
                console.log('💬 Processando comentário...');
                console.log('Comentário:', event.comment.body);
                console.log('Autor:', event.comment.user.login);
              } else {
                console.log('ℹ️ Evento não identificado:', event.action);
              }
              
              console.log('✅ Processo concluído!');
            } catch (error) {
              console.error('❌ Erro:', error.message);
              Deno.exit(1);
            }
          }
          
          await main();
          EOF
      
      - name: Generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
        run: deno run -A prompts/entry.ts
