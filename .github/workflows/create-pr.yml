name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: "!contains(github.event.comment.body , '[vx.dev]') && github.event.comment.user.type != 'bot'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Create package.json with type module
        run: |
          cat > package.json << 'EOF'
          {
            "name": "vx-dev",
            "version": "1.0.0",
            "type": "module",
            "dependencies": {
              "@octokit/rest": "^20.1.1",
              "openai": "^4.28.0",
              "tsx": "^4.0.0",
              "typescript": "^5.0.0"
            }
          }
          EOF
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
        run: npx tsx --esm prompts/entry.ts
