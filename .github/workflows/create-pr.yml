name: Create PR

on:
  issues:
    types: [edited, labeled, unlabeled]
  issue_comment:
    types: [created, edited, deleted]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  handle_issue:
    runs-on: ubuntu-latest
    name: Create PR
    if: "!contains(github.event.comment.body , '[vx.dev]') && github.event.comment.user.type != 'bot'"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      
      - name: Create common.ts with exports
        run: |
          cat > prompts/common.ts << 'EOF'
          export function getIssueEvent() {
            return {
              action: 'created',
              issue: {
                number: 1,
                title: 'Test Issue',
                body: 'Test body'
              },
              repository: {
                name: 'vx.dev',
                owner: { login: 'owner' }
              }
            };
          }
          
          export function getComment() {
            return {
              comment: {
                body: 'Test comment',
                user: { login: 'user' }
              }
            };
          }
          
          export function getPullRequest() {
            return {
              pull_request: {
                number: 1,
                title: 'Test PR',
                body: 'Test PR body'
              }
            };
          }
          
          // GitHub API helper usando fetch
          export async function githubRequest(endpoint: string, token: string, options: any = {}) {
            const response = await fetch(`https://api.github.com${endpoint}`, {
              ...options,
              headers: {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'vx-dev/1.0.0',
                ...options.headers
              }
            });
            
            if (!response.ok) {
              const error = await response.text();
              throw new Error(`GitHub API error ${response.status}: ${error}`);
            }
            
            return response.json();
          }
          EOF
      
      - name: Create entry.ts with correct imports
        run: |
          cat > prompts/entry.ts << 'EOF'
          import { getIssueEvent, githubRequest } from "./common.ts";
          
          // Função principal
          async function main() {
            try {
              console.log('Iniciando processo...');
              
              // Obtém o evento
              const eventData = getIssueEvent();
              console.log('Evento obtido:', eventData);
              
              // Usa o helper do GitHub
              if (Deno.env.get('GH_TOKEN')) {
                const repos = await githubRequest('/user/repos', Deno.env.get('GH_TOKEN') || '');
                console.log('Repositórios:', repos.length);
              }
              
              // Lógica principal aqui
              console.log('Processo concluído com sucesso!');
            } catch (error) {
              console.error('Erro:', error.message);
              Deno.exit(1);
            }
          }
          
          // Executa a função principal
          await main();
          EOF
      
      - name: Generate UI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WHITELIST: ${{ secrets.WHITELIST }}
          CONFIG: ${{ vars.CONFIG }}
          ACTOR: ${{ github.actor }}
        run: deno run -A prompts/entry.ts
